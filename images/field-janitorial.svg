<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Janitorial Interior Readiness</title>
  <desc id="desc">Stylized office interior with a janitorial cart and clean floor reflections.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f4f8ff"/>
      <stop offset="100%" stop-color="#dce8fb"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8fb4e8" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2f4f84" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1c38"/>
      <stop offset="100%" stop-color="#213f6f"/>
    </linearGradient>
  </defs>

  <rect width="1000" height="760" fill="url(#bg)"/>
  <rect y="500" width="1000" height="260" fill="url(#floor)"/>

  <g opacity="0.95">
    <rect x="70" y="90" width="860" height="380" rx="14" fill="#ffffff"/>
    <rect x="100" y="120" width="230" height="320" rx="10" fill="url(#glass)"/>
    <rect x="355" y="120" width="230" height="320" rx="10" fill="url(#glass)"/>
    <rect x="610" y="120" width="290" height="320" rx="10" fill="url(#glass)"/>
  </g>

  <g transform="translate(625 470)">
    <rect x="0" y="-120" width="220" height="130" rx="10" fill="#ffdd5f"/>
    <rect x="18" y="-104" width="72" height="52" rx="6" fill="#1f2f50"/>
    <rect x="102" y="-104" width="100" height="52" rx="6" fill="#1f2f50"/>
    <circle cx="38" cy="16" r="20" fill="#101c36"/>
    <circle cx="184" cy="16" r="20" fill="#101c36"/>
    <rect x="96" y="-190" width="16" height="75" fill="#6c89b8"/>
    <path d="M50 -190 L158 -190 L140 -160 L68 -160 Z" fill="#e8f2ff"/>
  </g>

  <text x="62" y="690" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#f2f6ff">JANITORIAL • INTERIOR READINESS</text>
</svg>

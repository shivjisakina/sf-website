    <circle cx="46" cy="95" r="22" fill="#0d1730"/>
    <circle cx="154" cy="95" r="22" fill="#0d1730"/>
    <rect x="120" y="8" width="16" height="64" fill="#1f2f50"/>
    <rect x="128" y="14" width="104" height="8" fill="#f6cf5e"/>

      <stop offset="0%" stop-color="#b9dcff"/>
      <stop offset="100%" stop-color="#e9f4ff"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b7299"/>
      <stop offset="100%" stop-color="#243c64"/>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 760" role="img" aria-labelledby="title desc">
  <title id="title">Exterior Pressure Wash</title>
  <desc id="desc">Stylized building facade being cleaned with high-pressure water stream.</desc>
  <defs>

      <rect x="320" y="155" width="150" height="95"/>
      <rect x="495" y="155" width="150" height="95"/>
      <rect x="670" y="155" width="150" height="95"/>
      <rect x="145" y="275" width="150" height="95"/>
      <rect x="320" y="275" width="150" height="95"/>
      <rect x="495" y="275" width="150" height="95"/>
      <rect x="670" y="275" width="150" height="95"/>
    </g>
    <rect x="145" y="395" width="675" height="150" fill="#d6e8ff" opacity="0.35"/>
  </g>

  <g transform="translate(80 420)">
